version: '3.8'

services:
  app:
    build: .
    ports:
      - "7001:7001"
    volumes:
      # 方式一：挂载配置文件目录
      - ~/.streamer_helper:/app/config:ro
      # 临时文件目录
      - ./temp:/app/temp
    environment:
      # 方式二：通过环境变量覆盖配置（推荐用于生产环境）
      - NODE_ENV=production
      # - TYPEORM_HOST=postgres
      # - TYPEORM_PORT=5432
      # - TYPEORM_USERNAME=postgres
      # - TYPEORM_PASSWORD=${DB_PASSWORD}
      # - TYPEORM_DATABASE=streamerhelper
      # - REDIS_HOST=redis
      # - S3_ENDPOINT=http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: streamerhelper
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
